[tox]
envlist = pyclean, codestyle-pylint, flake8, codestyle-ruff, docs, mypy, stubgen, pytest, buildpypi, installpypi
isolated_build = true
skip_missing_interpreters = true
#conda_env = environment.yaml
#conda_channels = conda-forge
requires =
    tox>=4.32.0
    #tox-conda # currently, tox-conda is incompatible with tox>=4.0

[testenv]
# This section intentionally left blank

[testenv:buildpypi]
description = build the pyaqsapi package
deps = build
       certifi
       cryptography
       pyclean
       ratelimit
       requests
       setuptools
       setuptools>=77.0.3
       wheel
depends = pyclean,
          codestyle-pylint,
          flake8,
          codestyle-ruff,
          docs,
          typecheck-mypy,
          typecheck-pyright,
          stubgen,
          pytest
commands = pyclean . --debris all
           python -m build .

[testenv:pyclean]
description = run pyclean on the pyaqsapi development directory, deleting _ALL_ debris
skip_install = true
deps = pyclean
commands = pyclean {posargs:. --debris all}

[testenv:installpypi]
description = perform a test install of pyaqsapi
deps = pip
       setuptools>=77.0.3
depends = buildpypi
commands = python -m pip install .

[testenv:pytest]
description = run unittests via pytest, print the pytest-cov unittesting report at the end
# Install the local package with the 'test' extras defined in pyproject.toml
deps = .[test]
commands = pytest {posargs:.}

[testenv:codestyle]
deps = pyenchant

# pylint includes spell checking
[testenv:codestyle-pylint]
description = run pylint since it includes a spell checker
skip_install = true
deps = pylint[spelling]
commands = pylint {posargs:.}

[testenv:codestyle-ruff]
description=install ruff and invoke it on the current folder
deps =
    ruff
commands =
       ruff format {posargs:.}
       ruff check {posargs:. --fix}
skip_install = true

# [testenv:typecheck]
# description = run mypy static type checker
# deps =
#     mypy
#     pandas-stubs
# commands =
#     mypy {posargs:.}

[testenv:docs]
description = rebuild sphinx docs using 'sphinx'
usedevelop = true
deps =
    certifi
    cryptography
    keyring
    numpydoc
    pandas
    requests
    sphinx
    sphinx-rtd-theme
    sphinxcontrib-bibtex
    wheel
change_dir = docs
commands =
  # remove old sphinx generated files
  python {posargs:-m sphinx -M clean . _build --jobs auto}
  # build the html docs
  sphinx-build {posargs:-M html . _build --jobs auto}
  # re-run build to ensure bibtex references are resolved
  sphinx-build {posargs:-M html . _build --jobs auto}
# conda_deps =
#     sphinx
#     sphinx-rtd-theme
#     sphinxcontrib-bibtex
#     numpydoc
#     pandas
#     keyring
#     certifi
#     cryptography
#     wheel
#     requests

[testenv:typecheck]
deps=
   pandas-stubs,
   types-requests,
   types-ratelimit

[testenv:typecheck-mypy]
deps = mypy
depends = typecheck
commands = mypy {posargs:-p pyaqsapi}
skip_install = true

[testenv:typecheck-pyright]
deps = pyright
depends = typecheck
command = pyright {posargs:-p .}
skip_install = true

[testenv:stubgen]
deps = mypy
depends = typecheck-mypy,
          typecheck-pyright
commands = stubgen {posargs:-p pyaqsapi --include-docstrings --include-private -o .}
           python {posargs:dontlintpyifiles.py}

[flake8]
max-line-length = 125
indent-size = 4
count = True
exclude = # No need to traverse our git directory
         .git,
         # There's no value in checking cache directories
          __pycache__,
          # The conf file is mostly autogenerated, ignore it
          docs/conf.py,
          # files in this folder are not compiled into the package and not pushed to the git repository.
          dev,
          # This contains our built documentation
          build,
          # This contains builds of flake8 that we don't want to check
          dist,
          # This contians builds of the package that we don't want to check
          .tox
ignore = N803, N806, W503
per-file-ignores =
    **/__init__.py:F401
commands=flake8 {posargs:.}

[pycodestyle]
max-line-length = 125
indent-size = 4