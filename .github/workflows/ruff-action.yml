name: Use ruff to lint and format code

on: [push, pull_request, workflow_dispatch]

jobs:
  lint:
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: astral-sh/ruff-action@v3
        with:
          version: "latest"
          args: "format --check --diff"
